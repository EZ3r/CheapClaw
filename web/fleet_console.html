<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CheapClaw Fleet Console</title>
  <style>
    :root {
      --bg: #f5f4ef;
      --card: #fffef9;
      --line: #d5d2c9;
      --ink: #1f1d18;
      --muted: #6b6558;
      --accent: #0d6e6e;
      --accent-2: #cb5d00;
      --danger: #b42318;
      --ok: #147a44;
      --shadow: 0 10px 24px rgba(26, 21, 10, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Avenir Next", "PingFang SC", "Helvetica Neue", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at top right, #fef8e6 0%, var(--bg) 45%, #eceae2 100%);
      min-height: 100vh;
    }
    .wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 22px;
      display: grid;
      gap: 14px;
    }
    .head {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px 18px;
      box-shadow: var(--shadow);
    }
    .head h1 {
      margin: 0 0 6px;
      font-size: 24px;
      letter-spacing: 0.2px;
    }
    .sub { color: var(--muted); font-size: 13px; }
    .toolbar {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 14px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 14px;
    }
    .card h2 {
      margin: 0 0 10px;
      font-size: 16px;
      letter-spacing: 0.2px;
    }
    .stats { grid-column: span 12; display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; }
    .kpi {
      background: #f9f8f2;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
    }
    .kpi .label { color: var(--muted); font-size: 12px; }
    .kpi .value { font-size: 22px; font-weight: 700; margin-top: 4px; }
    .kpi .tiny { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .manifest { grid-column: span 6; }
    .llm { grid-column: span 6; }
    .bots { grid-column: span 8; overflow: hidden; }
    .bot-form { grid-column: span 4; }
    .logs { grid-column: span 12; }
    .chat { grid-column: span 12; }
    .row {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    .row label { font-size: 13px; color: var(--muted); }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }
    textarea { min-height: 120px; resize: vertical; }
    button {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 12px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      font: inherit;
    }
    button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    button.warn { background: #fff6ed; color: var(--accent-2); border-color: #f3c499; }
    button.danger { background: #fff1f1; color: var(--danger); border-color: #f0b3b3; }
    .table-wrap { overflow: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border-bottom: 1px solid #ebe7dc; padding: 8px; text-align: left; white-space: nowrap; }
    th { color: var(--muted); font-weight: 600; background: #faf8f0; }
    .ops { display: flex; gap: 6px; }
    .ops button { padding: 4px 8px; font-size: 12px; }
    .ok { color: var(--ok); }
    .bad { color: var(--danger); }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
      background: #161616;
      color: #e8ffe5;
      border: 1px solid #2b2b2b;
      border-radius: 10px;
      padding: 10px;
      max-height: 260px;
      overflow: auto;
    }
    .chat-grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 10px;
      min-height: 320px;
    }
    .chat-list {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      overflow: auto;
      max-height: 440px;
    }
    .chat-item {
      padding: 8px 10px;
      border-bottom: 1px solid #eee8d8;
      cursor: pointer;
    }
    .chat-item:hover { background: #faf8f0; }
    .chat-item.active { background: #edf8f8; border-left: 3px solid var(--accent); padding-left: 7px; }
    .chat-item .cid { font-weight: 600; font-size: 13px; }
    .chat-item .meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .chat-pane {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 440px;
    }
    .chat-head {
      padding: 8px 10px;
      border-bottom: 1px solid #eee8d8;
      font-size: 13px;
      color: var(--muted);
    }
    .chat-events {
      padding: 10px;
      overflow: auto;
      display: grid;
      gap: 8px;
      align-content: start;
      background: #fdfcf8;
    }
    .msg {
      border: 1px solid #e9e4d6;
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
      font-size: 13px;
    }
    .msg .mhead {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }
    .chat-compose {
      border-top: 1px solid #eee8d8;
      padding: 8px 10px;
      display: grid;
      gap: 8px;
    }
    .chat-controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .multi-select {
      min-height: 82px;
      padding: 4px 6px;
    }
    .mention-wrap {
      position: relative;
    }
    .mention-menu {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
      max-height: 170px;
      overflow: auto;
      z-index: 30;
    }
    .mention-item {
      padding: 6px 10px;
      cursor: pointer;
      font-size: 13px;
      border-bottom: 1px solid #f0ece0;
    }
    .mention-item:last-child { border-bottom: 0; }
    .mention-item.active,
    .mention-item:hover {
      background: #edf8f8;
      color: var(--ink);
    }
    .status {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      min-height: 18px;
    }
    .hidden { display: none; }
    @media (max-width: 1120px) {
      .manifest, .llm, .bots, .bot-form, .logs, .chat { grid-column: span 12; }
      .stats { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .row { grid-template-columns: 1fr; }
      .chat-grid { grid-template-columns: 1fr; }
      .chat-controls { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="head">
      <h1>CheapClaw Fleet Console</h1>
      <div class="sub">统一控制台：全局配置、Bot 生命周期、状态监控、日志查看</div>
      <div class="toolbar">
        <button id="refreshBtn" class="primary">刷新</button>
        <button id="prepareBtn">Prepare</button>
        <button id="startAllBtn">启动全部</button>
        <button id="stopAllBtn" class="warn">停止全部</button>
        <button id="restartAllBtn">重启全部</button>
        <label><input id="autoRefreshChk" type="checkbox" checked /> 自动刷新</label>
      </div>
      <div class="status" id="globalStatus"></div>
    </section>

    <section class="grid">
      <div class="stats">
        <div class="kpi"><div class="label">Bot 总数</div><div class="value" id="kpiTotal">0</div><div class="tiny">manifest bots</div></div>
        <div class="kpi"><div class="label">运行中</div><div class="value" id="kpiRunning">0</div><div class="tiny">alive processes</div></div>
        <div class="kpi"><div class="label">待核销指令</div><div class="value" id="kpiPending">0</div><div class="tiny">pending instructions</div></div>
        <div class="kpi"><div class="label">控制台地址</div><div class="value" style="font-size:14px" id="kpiConsoleUrl">-</div><div class="tiny" id="kpiManifest">-</div></div>
      </div>

      <article class="card manifest">
        <h2>Fleet 配置</h2>
        <div class="row"><label>manifest_path</label><input id="manifestPath" disabled /></div>
        <div class="row"><label>runtime_root</label><input id="runtimeRoot" /></div>
        <div class="row"><label>fleet_config_path</label><input id="fleetConfigPath" /></div>
        <div class="row"><label>llm_config_path</label><input id="llmConfigPath" /></div>
        <div class="row"><label>http_proxy</label><input id="proxyHttp" /></div>
        <div class="row"><label>https_proxy</label><input id="proxyHttps" /></div>
        <div class="row"><label>all_proxy</label><input id="proxyAll" /></div>
        <div class="row"><label>user_history_compress_threshold_tokens</label><input id="ctxUserHistoryTokens" /></div>
        <div class="row"><label>structured_call_info_compress_threshold_agents</label><input id="ctxStructuredAgents" /></div>
        <div class="row"><label>structured_call_info_compress_threshold_tokens</label><input id="ctxStructuredTokens" /></div>
        <div class="toolbar">
          <button id="saveManifestBtn" class="primary">保存配置</button>
        </div>
      </article>

      <article class="card llm">
        <h2>LLM 配置文件</h2>
        <div class="row"><label>llm_config_path</label><input id="llmPathInput" /></div>
        <textarea id="llmContent" placeholder="llm yaml 内容"></textarea>
        <div class="toolbar">
          <button id="reloadLlmBtn">重新读取</button>
          <button id="saveLlmBtn" class="primary">保存 LLM 配置</button>
        </div>
      </article>

      <article class="card bots">
        <h2>Bot 列表与操作</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>bot_id</th>
                <th>channel</th>
                <th>enabled</th>
                <th>alive</th>
                <th>pid</th>
                <th>pending</th>
                <th>endpoint</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="botRows"></tbody>
          </table>
        </div>
      </article>

      <article class="card bot-form">
        <h2 id="botFormTitle">新增 Bot</h2>
        <div class="row"><label>bot_id</label><input id="fBotId" /></div>
        <div class="row"><label>display_name</label><input id="fDisplayName" /></div>
        <div class="row"><label>channel</label>
          <select id="fChannel">
            <option value="localweb">localweb</option>
            <option value="telegram">telegram</option>
            <option value="feishu">feishu</option>
            <option value="whatsapp">whatsapp</option>
            <option value="discord">discord</option>
            <option value="qq">qq (OneBot)</option>
            <option value="wechat">wechat (OneBot)</option>
          </select>
        </div>
        <div class="row"><label>enabled</label><select id="fEnabled"><option value="true">true</option><option value="false">false</option></select></div>
        <div class="row"><label>serve_webhooks</label><select id="fWebhooks"><option value="true">true</option><option value="false">false</option></select></div>
        <div class="row"><label>host</label><input id="fHost" value="127.0.0.1" /></div>
        <div class="row"><label>port</label><input id="fPort" value="8765" /></div>

        <div id="telegramFields" class="hidden">
          <div class="row"><label>telegram.bot_token</label><input id="fTgToken" /></div>
          <div class="row"><label>allowed_chats(csv)</label><input id="fTgChats" /></div>
        </div>
        <div id="feishuFields" class="hidden">
          <div class="row"><label>feishu.app_id</label><input id="fFsAppId" /></div>
          <div class="row"><label>feishu.app_secret</label><input id="fFsSecret" /></div>
          <div class="row"><label>feishu.mode</label><input id="fFsMode" value="long_connection" /></div>
          <div class="row"><label>verify_token</label><input id="fFsVerify" /></div>
          <div class="row"><label>encrypt_key</label><input id="fFsEncrypt" /></div>
        </div>
        <div id="waFields" class="hidden">
          <div class="row"><label>wa.access_token</label><input id="fWaToken" /></div>
          <div class="row"><label>wa.phone_number_id</label><input id="fWaPhone" /></div>
          <div class="row"><label>wa.verify_token</label><input id="fWaVerify" /></div>
          <div class="row"><label>wa.api_version</label><input id="fWaApi" value="v21.0" /></div>
        </div>
        <div id="discordFields" class="hidden">
          <div class="row"><label>discord.bot_token</label><input id="fDcToken" /></div>
          <div class="row"><label>discord.intents</label><input id="fDcIntents" value="37377" /></div>
          <div class="row"><label>require_mention_in_guild</label><select id="fDcMention"><option value="true">true</option><option value="false">false</option></select></div>
        </div>
        <div id="qqFields" class="hidden">
          <div class="row"><label>qq.onebot_api_base</label><input id="fQqApiBase" placeholder="http://127.0.0.1:5700" /></div>
          <div class="row"><label>qq.onebot_access_token</label><input id="fQqToken" /></div>
          <div class="row"><label>qq.onebot_post_secret</label><input id="fQqSecret" /></div>
          <div class="row"><label>qq.onebot_self_id</label><input id="fQqSelfId" /></div>
          <div class="row"><label>require_mention_in_group</label><select id="fQqMention"><option value="true">true</option><option value="false">false</option></select></div>
        </div>
        <div id="wechatFields" class="hidden">
          <div class="row"><label>wechat.onebot_api_base</label><input id="fWxApiBase" placeholder="http://127.0.0.1:5701" /></div>
          <div class="row"><label>wechat.onebot_access_token</label><input id="fWxToken" /></div>
          <div class="row"><label>wechat.onebot_post_secret</label><input id="fWxSecret" /></div>
          <div class="row"><label>wechat.onebot_self_id</label><input id="fWxSelfId" /></div>
          <div class="row"><label>require_mention_in_group</label><select id="fWxMention"><option value="true">true</option><option value="false">false</option></select></div>
        </div>
        <div id="localFields">
          <div class="row"><label>require_mention_in_group</label><select id="fLocalMention"><option value="true">true</option><option value="false">false</option></select></div>
        </div>
        <div class="toolbar">
          <button id="saveBotBtn" class="primary">保存 Bot</button>
          <button id="resetBotBtn">清空</button>
        </div>
      </article>

      <article class="card logs">
        <h2>Bot 日志查看</h2>
        <div class="row"><label>bot_id</label><input id="logBotId" placeholder="例如 bot_1" /></div>
        <div class="row"><label>kind</label><select id="logKind"><option value="loop">loop</option><option value="service">service</option></select></div>
        <div class="row"><label>lines</label><input id="logLines" value="160" /></div>
        <div class="toolbar">
          <button id="loadLogBtn">读取日志</button>
        </div>
        <div class="mono" id="logContent"></div>
      </article>

      <article class="card chat">
        <h2>群聊 / 本地聊天（localweb）</h2>
        <div class="chat-grid">
          <div>
            <div class="row"><label>新会话ID(可选)</label><input id="chatCreateId" placeholder="留空自动生成" /></div>
            <div class="row"><label>会话名称</label><input id="chatCreateName" placeholder="例如 运营群" /></div>
            <div class="row">
              <label>参与Bot(多选)</label>
              <select id="chatCreateBots" multiple class="multi-select"></select>
            </div>
            <div class="row"><label>群里必须@</label><select id="chatCreateMention"><option value="true">true</option><option value="false">false</option></select></div>
            <div class="toolbar">
              <button id="chatCreateBtn">创建会话</button>
              <button id="chatRefreshBtn">刷新会话</button>
            </div>
            <div class="chat-list" id="chatConversationList"></div>
          </div>
          <div class="chat-pane">
            <div class="chat-head" id="chatCurrentInfo">当前会话：-</div>
            <div class="chat-events" id="chatEvents"></div>
            <div class="chat-compose">
              <div class="chat-controls">
                <input id="chatSenderName" placeholder="sender_name" value="web_user" />
                <input id="chatSenderId" placeholder="sender_id" value="web_user" />
                <select id="chatMsgBots" multiple class="multi-select" title="可选：覆盖本条消息参与者；留空则沿用当前会话参与者"></select>
              </div>
              <div class="mention-wrap">
                <textarea id="chatMessage" placeholder="输入消息（群里可 @bot_id）"></textarea>
                <div id="chatMentionMenu" class="mention-menu hidden"></div>
              </div>
              <div class="toolbar">
                <button id="chatSendBtn" class="primary">发送消息</button>
                <button id="chatLoadBtn">读取历史</button>
              </div>
            </div>
          </div>
        </div>
      </article>
    </section>
  </div>

  <script>
    const state = {
      manifest: null,
      status: null,
      editBotId: "",
      localConversations: [],
      currentConversationId: "",
      autoRefreshEnabled: true,
      localwebBots: [],
      mentionMenu: {
        visible: false,
        start: 0,
        end: 0,
        activeIndex: 0,
        candidates: [],
      },
    };

    const el = (id) => document.getElementById(id);
    const boolVal = (v) => String(v) === "true";
    const esc = (v) => String(v ?? "").replace(/[&<>"']/g, (m) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[m]));
    const parseCsv = (v) => String(v || "").split(",").map((x) => x.trim()).filter(Boolean);
    function setStatus(msg, isError = false) {
      el("globalStatus").textContent = msg || "";
      el("globalStatus").style.color = isError ? "var(--danger)" : "var(--muted)";
    }
    function isUserEditingInput() {
      const active = document.activeElement;
      if (!active) return false;
      const tag = String(active.tagName || "").toUpperCase();
      if (!["INPUT", "TEXTAREA", "SELECT"].includes(tag)) return false;
      return !active.disabled;
    }

    async function apiGet(url) {
      const resp = await fetch(url);
      const payload = await resp.json();
      if (!resp.ok || payload.status !== "success") {
        throw new Error(payload.error || `request failed: ${url}`);
      }
      return payload;
    }
    async function apiPost(url, data) {
      const resp = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data || {}),
      });
      const payload = await resp.json();
      if (!resp.ok || payload.status !== "success") {
        throw new Error(payload.error || `request failed: ${url}`);
      }
      return payload;
    }

    function selectedValues(id) {
      const node = el(id);
      if (!(node instanceof HTMLSelectElement)) return [];
      return Array.from(node.selectedOptions).map((opt) => String(opt.value || "").trim()).filter(Boolean);
    }

    function setSelectedValues(id, values) {
      const node = el(id);
      if (!(node instanceof HTMLSelectElement)) return;
      const selected = new Set((values || []).map((x) => String(x || "").trim()).filter(Boolean));
      Array.from(node.options).forEach((opt) => {
        opt.selected = selected.has(String(opt.value || "").trim());
      });
    }

    function localwebBotsFromManifest() {
      const bots = Array.isArray(state.manifest?.manifest?.bots) ? state.manifest.manifest.bots : [];
      const out = [];
      for (const item of bots) {
        if (!item || typeof item !== "object") continue;
        if (!Boolean(item.enabled ?? true)) continue;
        if (String(item.channel || "").toLowerCase() !== "localweb") continue;
        const botId = String(item.bot_id || "").trim();
        if (!botId) continue;
        const displayName = String(item.display_name || botId).trim();
        out.push({ bot_id: botId, display_name: displayName });
      }
      return out;
    }

    function refreshLocalwebBotSelectors() {
      state.localwebBots = localwebBotsFromManifest();
      const oldCreate = selectedValues("chatCreateBots");
      const oldMsg = selectedValues("chatMsgBots");
      const targets = [el("chatCreateBots"), el("chatMsgBots")];
      for (const node of targets) {
        if (!(node instanceof HTMLSelectElement)) continue;
        node.innerHTML = state.localwebBots.map((bot) => (
          `<option value="${esc(bot.bot_id)}">${esc(bot.display_name)} (${esc(bot.bot_id)})</option>`
        )).join("");
      }
      setSelectedValues("chatCreateBots", oldCreate);
      setSelectedValues("chatMsgBots", oldMsg);
    }

    function syncComposeParticipantsWithCurrentConversation() {
      const current = (state.localConversations || []).find(
        (x) => String(x.conversation_id || "") === String(state.currentConversationId || ""),
      ) || null;
      if (!current) return;
      setSelectedValues("chatMsgBots", Array.isArray(current.participant_bots) ? current.participant_bots : []);
    }

    function closeMentionMenu() {
      state.mentionMenu.visible = false;
      state.mentionMenu.candidates = [];
      state.mentionMenu.activeIndex = 0;
      el("chatMentionMenu").classList.add("hidden");
      el("chatMentionMenu").innerHTML = "";
    }

    function openMentionMenu(start, end, candidates) {
      state.mentionMenu.visible = true;
      state.mentionMenu.start = start;
      state.mentionMenu.end = end;
      state.mentionMenu.activeIndex = 0;
      state.mentionMenu.candidates = candidates.slice();
      const menu = el("chatMentionMenu");
      menu.classList.remove("hidden");
      menu.innerHTML = candidates.map((bot, idx) => (
        `<div class="mention-item ${idx === 0 ? "active" : ""}" data-index="${idx}" data-bot="${esc(bot.bot_id)}">`
        + `@${esc(bot.bot_id)} <span style="color:var(--muted)">(${esc(bot.display_name)})</span></div>`
      )).join("");
    }

    function refreshMentionMenuActive() {
      const menu = el("chatMentionMenu");
      Array.from(menu.querySelectorAll(".mention-item")).forEach((node, idx) => {
        node.classList.toggle("active", idx === state.mentionMenu.activeIndex);
      });
    }

    function applyMentionCandidate(botId) {
      const input = el("chatMessage");
      const text = input.value || "";
      const start = Math.max(0, Number(state.mentionMenu.start || 0));
      const end = Math.max(start, Number(state.mentionMenu.end || start));
      const replacement = `@${botId} `;
      input.value = text.slice(0, start) + replacement + text.slice(end);
      const nextCursor = start + replacement.length;
      input.focus();
      input.setSelectionRange(nextCursor, nextCursor);
      closeMentionMenu();
    }

    function updateMentionMenuFromCaret() {
      const input = el("chatMessage");
      if (!(input instanceof HTMLTextAreaElement)) return;
      const cursor = Number(input.selectionStart || 0);
      const left = String(input.value || "").slice(0, cursor);
      const match = left.match(/@([A-Za-z0-9_.-]*)$/);
      if (!match) {
        closeMentionMenu();
        return;
      }
      const query = String(match[1] || "").toLowerCase();
      const candidates = (state.localwebBots || []).filter((bot) => {
        const id = String(bot.bot_id || "").toLowerCase();
        const name = String(bot.display_name || "").toLowerCase();
        if (!query) return true;
        return id.includes(query) || name.includes(query);
      });
      if (!candidates.length) {
        closeMentionMenu();
        return;
      }
      const start = cursor - query.length - 1;
      openMentionMenu(start, cursor, candidates.slice(0, 12));
    }

    function renderKpi() {
      const status = state.status || {};
      const bots = Array.isArray(status.bots) ? status.bots : [];
      el("kpiTotal").textContent = String(bots.length);
      el("kpiRunning").textContent = String(status.running_count || 0);
      el("kpiPending").textContent = String(status.pending_instruction_total || 0);
      el("kpiConsoleUrl").textContent = status.web_console?.url || "-";
      el("kpiManifest").textContent = status.manifest_path || "-";
    }

    function fillManifestForm() {
      const manifest = state.manifest?.manifest || {};
      el("manifestPath").value = state.manifest?.manifest_path || "";
      el("runtimeRoot").value = manifest.runtime_root || "";
      el("fleetConfigPath").value = manifest.fleet_config_path || "";
      el("llmConfigPath").value = manifest.llm_config_path || "";
      const proxy = manifest.proxy_env || {};
      el("proxyHttp").value = proxy.http_proxy || "";
      el("proxyHttps").value = proxy.https_proxy || "";
      el("proxyAll").value = proxy.all_proxy || "";
      const context = manifest.context || {};
      el("ctxUserHistoryTokens").value = String(context.user_history_compress_threshold_tokens ?? 1500);
      el("ctxStructuredAgents").value = String(context.structured_call_info_compress_threshold_agents ?? 10);
      el("ctxStructuredTokens").value = String(context.structured_call_info_compress_threshold_tokens ?? 2200);
      el("llmPathInput").value = manifest.llm_config_path || "";
    }

    function channelFieldToggle() {
      const channel = el("fChannel").value;
      el("telegramFields").classList.toggle("hidden", channel !== "telegram");
      el("feishuFields").classList.toggle("hidden", channel !== "feishu");
      el("waFields").classList.toggle("hidden", channel !== "whatsapp");
      el("discordFields").classList.toggle("hidden", channel !== "discord");
      el("qqFields").classList.toggle("hidden", channel !== "qq");
      el("wechatFields").classList.toggle("hidden", channel !== "wechat");
      el("localFields").classList.toggle("hidden", channel !== "localweb");
    }

    function botPayloadFromForm() {
      const channel = el("fChannel").value;
      const payload = {
        bot_id: el("fBotId").value.trim(),
        display_name: el("fDisplayName").value.trim(),
        channel,
        enabled: boolVal(el("fEnabled").value),
        serve_webhooks: boolVal(el("fWebhooks").value),
        host: el("fHost").value.trim(),
        port: Number(el("fPort").value || 8765),
      };
      if (channel === "telegram") {
        payload.telegram = {
          bot_token: el("fTgToken").value.trim(),
          allowed_chats: el("fTgChats").value.split(",").map((x) => x.trim()).filter(Boolean),
        };
      } else if (channel === "feishu") {
        payload.feishu = {
          app_id: el("fFsAppId").value.trim(),
          app_secret: el("fFsSecret").value.trim(),
          mode: el("fFsMode").value.trim() || "long_connection",
          verify_token: el("fFsVerify").value.trim(),
          encrypt_key: el("fFsEncrypt").value.trim(),
        };
      } else if (channel === "whatsapp") {
        payload.whatsapp = {
          access_token: el("fWaToken").value.trim(),
          phone_number_id: el("fWaPhone").value.trim(),
          verify_token: el("fWaVerify").value.trim(),
          api_version: el("fWaApi").value.trim() || "v21.0",
        };
      } else if (channel === "discord") {
        payload.discord = {
          bot_token: el("fDcToken").value.trim(),
          intents: Number(el("fDcIntents").value || 37377),
          require_mention_in_guild: boolVal(el("fDcMention").value),
        };
      } else if (channel === "qq") {
        payload.qq = {
          onebot_api_base: el("fQqApiBase").value.trim(),
          onebot_access_token: el("fQqToken").value.trim(),
          onebot_post_secret: el("fQqSecret").value.trim(),
          onebot_self_id: el("fQqSelfId").value.trim(),
          require_mention_in_group: boolVal(el("fQqMention").value),
        };
      } else if (channel === "wechat") {
        payload.wechat = {
          onebot_api_base: el("fWxApiBase").value.trim(),
          onebot_access_token: el("fWxToken").value.trim(),
          onebot_post_secret: el("fWxSecret").value.trim(),
          onebot_self_id: el("fWxSelfId").value.trim(),
          require_mention_in_group: boolVal(el("fWxMention").value),
        };
      } else {
        payload.localweb = {
          require_mention_in_group: boolVal(el("fLocalMention").value),
        };
      }
      return payload;
    }

    function fillBotForm(bot) {
      state.editBotId = bot?.bot_id || "";
      el("botFormTitle").textContent = state.editBotId ? `编辑 Bot: ${state.editBotId}` : "新增 Bot";
      el("fBotId").value = bot?.bot_id || "";
      el("fBotId").disabled = !!state.editBotId;
      el("fDisplayName").value = bot?.display_name || "";
      el("fChannel").value = bot?.channel || "localweb";
      el("fEnabled").value = String(Boolean(bot?.enabled ?? true));
      const channel = el("fChannel").value;
      const defaultWebhook = channel === "localweb" || channel === "qq" || channel === "wechat";
      el("fWebhooks").value = String(Boolean(bot?.serve_webhooks ?? defaultWebhook));
      el("fHost").value = bot?.host || "127.0.0.1";
      el("fPort").value = String(bot?.port || 8765);
      el("fTgToken").value = bot?.telegram?.bot_token || "";
      el("fTgChats").value = (bot?.telegram?.allowed_chats || []).join(",");
      el("fFsAppId").value = bot?.feishu?.app_id || "";
      el("fFsSecret").value = bot?.feishu?.app_secret || "";
      el("fFsMode").value = bot?.feishu?.mode || "long_connection";
      el("fFsVerify").value = bot?.feishu?.verify_token || "";
      el("fFsEncrypt").value = bot?.feishu?.encrypt_key || "";
      el("fWaToken").value = bot?.whatsapp?.access_token || "";
      el("fWaPhone").value = bot?.whatsapp?.phone_number_id || "";
      el("fWaVerify").value = bot?.whatsapp?.verify_token || "";
      el("fWaApi").value = bot?.whatsapp?.api_version || "v21.0";
      el("fDcToken").value = bot?.discord?.bot_token || "";
      el("fDcIntents").value = String(bot?.discord?.intents || 37377);
      el("fDcMention").value = String(Boolean(bot?.discord?.require_mention_in_guild ?? true));
      el("fQqApiBase").value = bot?.qq?.onebot_api_base || "http://127.0.0.1:5700";
      el("fQqToken").value = bot?.qq?.onebot_access_token || "";
      el("fQqSecret").value = bot?.qq?.onebot_post_secret || "";
      el("fQqSelfId").value = bot?.qq?.onebot_self_id || "";
      el("fQqMention").value = String(Boolean(bot?.qq?.require_mention_in_group ?? true));
      el("fWxApiBase").value = bot?.wechat?.onebot_api_base || "http://127.0.0.1:5701";
      el("fWxToken").value = bot?.wechat?.onebot_access_token || "";
      el("fWxSecret").value = bot?.wechat?.onebot_post_secret || "";
      el("fWxSelfId").value = bot?.wechat?.onebot_self_id || "";
      el("fWxMention").value = String(Boolean(bot?.wechat?.require_mention_in_group ?? true));
      el("fLocalMention").value = String(Boolean(bot?.localweb?.require_mention_in_group ?? true));
      channelFieldToggle();
    }

    function renderBots() {
      const tbody = el("botRows");
      const bots = Array.isArray(state.status?.bots) ? state.status.bots : [];
      if (!bots.length) {
        tbody.innerHTML = `<tr><td colspan="8">暂无 bot</td></tr>`;
        return;
      }
      tbody.innerHTML = bots.map((bot) => {
        const id = esc(bot.bot_id || "");
        const endpoint = bot.endpoint_url ? `<a href="${esc(bot.endpoint_url)}" target="_blank">${esc(bot.endpoint_url)}</a>` : "-";
        return `
          <tr>
            <td>${id}</td>
            <td>${esc(bot.channel || "-")}</td>
            <td>${bot.enabled ? '<span class="ok">true</span>' : '<span class="bad">false</span>'}</td>
            <td>${bot.alive ? '<span class="ok">alive</span>' : '<span class="bad">down</span>'}</td>
            <td>${esc(bot.pid || 0)}</td>
            <td>${esc(bot.pending_instruction_count || 0)}</td>
            <td>${endpoint}</td>
            <td>
              <div class="ops">
                <button data-op="start" data-id="${id}">启动</button>
                <button data-op="stop" data-id="${id}" class="warn">停止</button>
                <button data-op="reload" data-id="${id}">重载</button>
                <button data-op="edit" data-id="${id}">编辑</button>
                <button data-op="delete" data-id="${id}" class="danger">删除</button>
              </div>
            </td>
          </tr>
        `;
      }).join("");
    }

    function renderChatConversations() {
      const container = el("chatConversationList");
      const items = Array.isArray(state.localConversations) ? state.localConversations : [];
      if (!items.length) {
        container.innerHTML = `<div class="chat-item">暂无会话</div>`;
        return;
      }
      container.innerHTML = items.map((item) => {
        const cid = String(item.conversation_id || "");
        const name = String(item.display_name || cid || "-");
        const active = cid === state.currentConversationId ? "active" : "";
        const participants = (item.participant_bots || []).join(",") || "-";
        return `
          <div class="chat-item ${active}" data-cid="${esc(cid)}">
            <div class="cid">${esc(name)}</div>
            <div class="meta">${esc(cid)} | ${esc(item.conversation_type || "group")} | bots: ${esc(participants)}</div>
          </div>
        `;
      }).join("");
      const current = items.find((x) => String(x.conversation_id || "") === state.currentConversationId) || null;
      el("chatCurrentInfo").textContent = current
        ? `当前会话：${current.display_name || current.conversation_id} (${current.conversation_id})`
        : "当前会话：-";
    }

    function renderChatEvents(events) {
      const container = el("chatEvents");
      const items = Array.isArray(events) ? events : [];
      if (!items.length) {
        container.innerHTML = `<div class="msg"><div class="mhead">系统</div><div>暂无消息</div></div>`;
        return;
      }
      container.innerHTML = items.map((evt) => {
        const sender = evt.sender_name || evt.sender_id || "unknown";
        const ts = evt.timestamp || "-";
        const txt = evt.message_text || "";
        const mentions = (evt.mentions || []).join(", ");
        return `
          <div class="msg">
            <div class="mhead">${esc(sender)} | ${esc(ts)}${mentions ? ` | @${esc(mentions)}` : ""}</div>
            <div>${esc(txt)}</div>
          </div>
        `;
      }).join("");
      container.scrollTop = container.scrollHeight;
    }

    async function refreshLocalChats(keepSelection = true) {
      const payload = await apiGet("/api/localchat/conversations");
      state.localConversations = Array.isArray(payload.conversations) ? payload.conversations : [];
      if (!keepSelection || !state.currentConversationId) {
        state.currentConversationId = state.localConversations[0]?.conversation_id || "";
      } else {
        const exists = state.localConversations.some((x) => String(x.conversation_id || "") === state.currentConversationId);
        if (!exists) {
          state.currentConversationId = state.localConversations[0]?.conversation_id || "";
        }
      }
      renderChatConversations();
      syncComposeParticipantsWithCurrentConversation();
      if (state.currentConversationId) {
        await loadChatEvents();
      } else {
        renderChatEvents([]);
      }
    }

    async function loadChatEvents() {
      if (!state.currentConversationId) {
        renderChatEvents([]);
        return;
      }
      const payload = await apiGet(`/api/localchat/events?conversation_id=${encodeURIComponent(state.currentConversationId)}&limit=200`);
      renderChatEvents(payload.events || []);
    }

    async function refreshAll() {
      try {
        const [manifest, status, llm] = await Promise.all([
          apiGet("/api/manifest"),
          apiGet("/api/status"),
          apiGet("/api/llm-config"),
        ]);
        state.manifest = manifest;
        state.status = status;
        fillManifestForm();
        refreshLocalwebBotSelectors();
        el("llmContent").value = llm.content || "";
        renderKpi();
        renderBots();
        await refreshLocalChats(true);
        setStatus("刷新完成");
      } catch (err) {
        setStatus(String(err.message || err), true);
      }
    }

    async function runAction(label, fn) {
      try {
        setStatus(`${label}...`);
        await fn();
        await refreshAll();
        setStatus(`${label}完成`);
      } catch (err) {
        setStatus(`${label}失败: ${String(err.message || err)}`, true);
      }
    }

    function bindEvents() {
      el("fChannel").addEventListener("change", channelFieldToggle);
      el("refreshBtn").addEventListener("click", () => refreshAll());
      el("prepareBtn").addEventListener("click", () => runAction("Prepare", () => apiPost("/api/prepare", {})));
      el("startAllBtn").addEventListener("click", () => runAction("启动全部", () => apiPost("/api/start", {})));
      el("stopAllBtn").addEventListener("click", () => runAction("停止全部", () => apiPost("/api/stop", {})));
      el("restartAllBtn").addEventListener("click", () => runAction("重启全部", () => apiPost("/api/restart", {})));

      el("saveManifestBtn").addEventListener("click", () => runAction("保存 Fleet 配置", () => apiPost("/api/manifest/save", {
        runtime_root: el("runtimeRoot").value.trim(),
        fleet_config_path: el("fleetConfigPath").value.trim(),
        llm_config_path: el("llmConfigPath").value.trim(),
        proxy_env: {
          http_proxy: el("proxyHttp").value.trim(),
          https_proxy: el("proxyHttps").value.trim(),
          all_proxy: el("proxyAll").value.trim(),
        },
        context: {
          user_history_compress_threshold_tokens: Number(el("ctxUserHistoryTokens").value || 1500),
          structured_call_info_compress_threshold_agents: Number(el("ctxStructuredAgents").value || 10),
          structured_call_info_compress_threshold_tokens: Number(el("ctxStructuredTokens").value || 2200),
        },
      })));
      el("autoRefreshChk").addEventListener("change", () => {
        state.autoRefreshEnabled = !!el("autoRefreshChk").checked;
        setStatus(state.autoRefreshEnabled ? "自动刷新已开启" : "自动刷新已暂停");
      });

      el("reloadLlmBtn").addEventListener("click", async () => {
        await runAction("读取 LLM 配置", async () => {
          const payload = await apiGet("/api/llm-config");
          el("llmPathInput").value = payload.llm_config_path || "";
          el("llmContent").value = payload.content || "";
        });
      });
      el("saveLlmBtn").addEventListener("click", () => runAction("保存 LLM 配置", () => apiPost("/api/llm-config/save", {
        llm_config_path: el("llmPathInput").value.trim(),
        content: el("llmContent").value,
      })));

      el("saveBotBtn").addEventListener("click", () => runAction("保存 Bot", async () => {
        const bot = botPayloadFromForm();
        if (state.editBotId) {
          await apiPost("/api/bots/update", { bot_id: state.editBotId, bot });
        } else {
          await apiPost("/api/bots/add", { bot });
        }
        fillBotForm(null);
      }));

      el("resetBotBtn").addEventListener("click", () => fillBotForm(null));

      el("botRows").addEventListener("click", async (ev) => {
        const target = ev.target;
        if (!(target instanceof HTMLButtonElement)) return;
        const op = target.dataset.op || "";
        const botId = target.dataset.id || "";
        if (!op || !botId) return;
        if (op === "start") return runAction(`启动 ${botId}`, () => apiPost("/api/start", { bot_id: botId }));
        if (op === "stop") return runAction(`停止 ${botId}`, () => apiPost("/api/stop", { bot_id: botId }));
        if (op === "reload") return runAction(`重载 ${botId}`, () => apiPost("/api/reload", { bot_id: botId, prepare_first: true }));
        if (op === "delete") {
          if (!confirm(`确认删除 bot: ${botId} ?`)) return;
          return runAction(`删除 ${botId}`, () => apiPost("/api/bots/delete", { bot_id: botId }));
        }
        if (op === "edit") {
          const bots = Array.isArray(state.manifest?.manifest?.bots) ? state.manifest.manifest.bots : [];
          const bot = bots.find((b) => String(b?.bot_id || "") === botId) || null;
          fillBotForm(bot);
        }
      });

      el("chatConversationList").addEventListener("click", async (ev) => {
        const target = ev.target;
        if (!(target instanceof HTMLElement)) return;
        const item = target.closest(".chat-item");
        if (!item) return;
        const cid = item.getAttribute("data-cid") || "";
        if (!cid) return;
        state.currentConversationId = cid;
        renderChatConversations();
        await runAction(`加载会话 ${cid}`, () => loadChatEvents());
      });

      el("chatRefreshBtn").addEventListener("click", () => runAction("刷新会话", () => refreshLocalChats(true)));

      el("chatCreateBtn").addEventListener("click", () => runAction("创建会话", async () => {
        const payload = await apiPost("/api/localchat/create", {
          conversation_id: el("chatCreateId").value.trim(),
          display_name: el("chatCreateName").value.trim(),
          participant_bots: selectedValues("chatCreateBots"),
          require_mention: boolVal(el("chatCreateMention").value),
          conversation_type: "group",
          created_by: "web_console",
        });
        if (Array.isArray(payload.ignored_participant_bots) && payload.ignored_participant_bots.length) {
          setStatus(`已忽略非 localweb bot: ${payload.ignored_participant_bots.join(", ")}`, true);
        }
        state.currentConversationId = payload.conversation?.conversation_id || state.currentConversationId;
        await refreshLocalChats(true);
      }));

      el("chatSendBtn").addEventListener("click", () => runAction("发送聊天消息", async () => {
        const cid = state.currentConversationId || el("chatCreateId").value.trim();
        if (!cid) throw new Error("请先选择或创建会话");
        const message = el("chatMessage").value.trim();
        if (!message) throw new Error("消息不能为空");
        const sendPayload = {
          conversation_id: cid,
          message,
          sender_name: el("chatSenderName").value.trim() || "web_user",
          sender_id: el("chatSenderId").value.trim() || "web_user",
        };
        const selectedBots = selectedValues("chatMsgBots");
        if (selectedBots.length) {
          sendPayload.participant_bots = selectedBots;
        }
        const payload = await apiPost("/api/localchat/send", sendPayload);
        if (Array.isArray(payload.ignored_participant_bots) && payload.ignored_participant_bots.length) {
          setStatus(`已忽略非 localweb bot: ${payload.ignored_participant_bots.join(", ")}`, true);
        }
        el("chatMessage").value = "";
        closeMentionMenu();
        await loadChatEvents();
      }));

      el("chatLoadBtn").addEventListener("click", () => runAction("读取聊天历史", () => loadChatEvents()));

      el("chatMessage").addEventListener("input", () => updateMentionMenuFromCaret());
      el("chatMessage").addEventListener("click", () => updateMentionMenuFromCaret());
      el("chatMessage").addEventListener("keyup", (ev) => {
        if (["ArrowUp", "ArrowDown", "Enter", "Escape", "Tab"].includes(ev.key)) return;
        updateMentionMenuFromCaret();
      });
      el("chatMessage").addEventListener("keydown", (ev) => {
        if (!state.mentionMenu.visible || !state.mentionMenu.candidates.length) return;
        if (ev.key === "ArrowDown") {
          ev.preventDefault();
          state.mentionMenu.activeIndex = (state.mentionMenu.activeIndex + 1) % state.mentionMenu.candidates.length;
          refreshMentionMenuActive();
          return;
        }
        if (ev.key === "ArrowUp") {
          ev.preventDefault();
          state.mentionMenu.activeIndex =
            (state.mentionMenu.activeIndex - 1 + state.mentionMenu.candidates.length) % state.mentionMenu.candidates.length;
          refreshMentionMenuActive();
          return;
        }
        if (ev.key === "Enter" || ev.key === "Tab") {
          ev.preventDefault();
          const selected = state.mentionMenu.candidates[state.mentionMenu.activeIndex] || state.mentionMenu.candidates[0];
          if (selected?.bot_id) {
            applyMentionCandidate(selected.bot_id);
          } else {
            closeMentionMenu();
          }
          return;
        }
        if (ev.key === "Escape") {
          ev.preventDefault();
          closeMentionMenu();
        }
      });
      el("chatMentionMenu").addEventListener("mousedown", (ev) => {
        const target = ev.target;
        if (!(target instanceof HTMLElement)) return;
        const item = target.closest(".mention-item");
        if (!item) return;
        ev.preventDefault();
        const botId = item.getAttribute("data-bot") || "";
        if (botId) applyMentionCandidate(botId);
      });
      document.addEventListener("click", (ev) => {
        const target = ev.target;
        if (!(target instanceof HTMLElement)) return;
        if (target.closest("#chatMentionMenu") || target.closest("#chatMessage")) return;
        closeMentionMenu();
      });

      el("loadLogBtn").addEventListener("click", () => runAction("读取日志", async () => {
        const botId = el("logBotId").value.trim();
        const kind = el("logKind").value;
        const lines = Number(el("logLines").value || 160);
        const payload = await apiGet(`/api/log-tail?bot_id=${encodeURIComponent(botId)}&kind=${encodeURIComponent(kind)}&lines=${encodeURIComponent(lines)}`);
        el("logContent").textContent = payload.content || "";
      }));
    }

    fillBotForm(null);
    bindEvents();
    refreshAll();
    setInterval(() => {
      if (!state.autoRefreshEnabled) return;
      if (isUserEditingInput()) return;
      refreshAll().catch(() => {});
    }, 10000);
    setInterval(() => {
      if (!state.autoRefreshEnabled) return;
      if (!state.currentConversationId) return;
      if (isUserEditingInput()) return;
      loadChatEvents().catch(() => {});
    }, 3000);
  </script>
</body>
</html>
